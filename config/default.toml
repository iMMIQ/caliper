# Caliper 默认配置。运行时优先级：命令行参数 > 环境变量 > 本文件 > 代码默认值。
# CANN 工具链默认自动发现（按 ASCEND_TOOLKIT_HOME / 常见安装路径），无需在此写死路径。

[server]
bind = "0.0.0.0:7878"

[storage]
dir = "storage"

[run]
iters = 100
warmup = 10
msprof_iters = 10
# msprof 采集这几次推理的执行数据（取证样本数，远小于 iters）

[devices]
# ids = [0, 1, 2, 3]       # 留空时从 npu-smi info -m 的 Chip Logic ID / /dev/davinci* 自动发现
lock_dir = "/tmp/caliper-device-locks" # 多实例/多用户必须使用同一目录；生产建议由管理员预建
poll_interval_ms = 1000
require_idle = true         # npu-smi 无法确认空闲时拒绝调度，避免污染结果

[cann]
# 以下均可留空，留空即自动发现：
# home = ""              # CANN 工具链根目录（含 set_env.sh / bin/atc）
# soc_version = ""       # 目标 SoC，如 Ascend310P3；留空则从 npu-smi 推断
# runner = ""            # caliper-runner 可执行文件路径；留空则用同目录下的同名二进制
# libascendcl = ""       # libascendcl.so 绝对路径；留空则在 home 下搜索
